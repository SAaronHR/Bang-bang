<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSONAJE 2</title>
    <link rel="stylesheet" type="text/css" href="estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&family=Sancreek&display=swap" rel="stylesheet">
    <!-- manifest -->
</head>
<body>
    <div class="bg-transicion bg-transicion-show"></div>
    <div class="bg-personaje">
        <div class="titulo">
            <h1>SELECCIONA TU PERSONAJE</h1>
        </div>
        <div class="personajes">
            <!-- ==== Boton Izquierda ==== -->
            <button class="anterior" onclick="anteriorPersonaje()">
                <img src="img/left.png">
            </button>
            <!-- ==== Carrusel Personajes ==== -->
            <div class="personaje">
                <img src="img/p1.png" id="personaje" style="transform: rotateY(180deg);">
            </div>
            <!-- ==== Boton Derecha ==== -->
            <button class="siguiente" onclick="siguientePersonaje()">
                <img src="img/right.png">
            </button>   
        </div>
        <div class="barra">
                <input type="text" id="jugador2" placeholder="Jugador 2" class="txt-nombre">
                <button class="btn-siguiente" onclick="comenzarJuego()">SIGUIENTE</button>
        </div>
    </div>
</body>
<script type="text/javascript" src="funciones.js"></script>
<script type="text/javascript">
    window.addEventListener('load', function() {
        inicializarSelectorPersonaje();
        quitarBG();
    });
</script>
</html>
